<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Learning Observation Form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo">
    <div class="title">
      <h1>ONLINE LEARNING</h1>
      <h2>OBSERVATION FORM</h2>
      <h3>نموذج ملاحظة التعلم عن بُعد</h3>
    </div>
    <img src="logo2.png" class="logo">
  </div>

  <!-- INFO ROW -->
  <div class="info-row">
    <div>
      <label>Teacher Name<br><span class="ar">اسم المعلم</span></label>
      <input id="teacherName">
    </div>

    <div>
      <label>Observer Name<br><span class="ar">اسم الملاحظ</span></label>
      <input id="observerName">
    </div>

    <div>
      <label>Date<br><span class="ar">التاريخ</span></label>
      <input type="date" id="date">
    </div>

    <div>
      <label>Time<br><span class="ar">الوقت</span></label>
      <input type="time" id="time">
    </div>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>
          Area<br><span class="ar">المجال</span>
        </th>
        <th>
          Observation<br><span class="ar">الملاحظة</span>
        </th>
        <th>
          Comments<br><span class="ar">التعليقات</span>
        </th>
      </tr>
    </thead>

    <tbody>

      <tr>
